<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>L3D Headline Preview</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				background: #111;
				color: #fff;
				font-family: Arial, Helvetica, sans-serif;
				min-height: 100vh;
				display: flex;
				align-items: flex-end;
				padding: 24px;
			}
			.l3d {
				background: rgba(0, 0, 0, 0.75);
				border-left: 6px solid #9467bd;
				padding: 12px 20px;
				max-width: 100%;
			}
			.headline {
				font-size: 26px;
				font-weight: bold;
				line-height: 1.2;
			}
			.subline {
				font-size: 18px;
				color: #ccc;
				margin-top: 4px;
			}
		</style>
	</head>
	<body>
		<div class="l3d">
			<div class="headline" id="headline"></div>
			<div class="subline" id="subline"></div>
		</div>
		<script>
			const params = new URLSearchParams(window.location.search)
			document.getElementById('headline').textContent = params.get('headline') || 'Headline'
			const subline = params.get('subline') || ''
			const sublineEl = document.getElementById('subline')
			sublineEl.textContent = subline
			sublineEl.style.display = subline ? 'block' : 'none'
		</script>
	</body>
</html>
